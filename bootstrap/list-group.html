<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list</title>

    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
<div class="container">
    <ul class="list-group">
        <li class="list-group-item">raipur</li>
        <li class="list-group-item">durg</li>
        <li class="list-group-item">bhilai</li>
        <li class="list-group-item"></li>
    </ul>
</div>
<br><br>
<div class="container">
    <ul class="list-group">
        <li class="list-group-item active">raipur</li>
        <li class="list-group-item">durg</li>
        <li class="list-group-item disabled">bhilai</li>
        <li class="list-group-item">bilaspur</li>
    </ul>
</div>
<br><br>
<div class="container">
    <ul class="list-group">
        <li class="list-group-item list-group-item-action">raipur</li>
        <li class="list-group-item list-group-item-action">durg</li>
        <li class="list-group-item list-group-item-action">bhilai</li>
        <li class="list-group-item list-group-item-action">bilaspur</li>
    </ul>
</div>
    
</body>

</html>
