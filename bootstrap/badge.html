<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Badge</title>

        <!-- Latest compiled and minified CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- Latest compiled JavaScript -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>

        <div class="container">
            <span class="badge bg-primary"> primary</span>
            <span class="badge bg-secondary"> secondary</span>
            <span class="badge bg-success"> success</span>
            <span class="badge bg-danger"> danger</span>
            <span class="badge bg-info"> primary</span>
            <span class="badge bg-warning"> warning</span>
        </div>
        <br><br>
        <div class="container">
            <span class="badge rounded-pill bg-primary"> primary</span>
            <span class="badge rounded-pill  bg-secondary"> secondary</span>
            <span class="badge rounded-pill  bg-success"> success</span>
            <span class="badge rounded-pill  bg-danger"> danger</span>
            <span class="badge rounded-pill  bg-info"> primary</span>
            <span class="badge rounded-pill  bg-warning"> warning</span>
        </div>
        <br><br>

        <button class="btn btn-primary"> user
            <span class="badge bg-info">5</span>
        </button>

        <button class="btn btn-warning"> user
            <span class=" badge rounded-pill bg-danger">10</span>
        </button>


    </body>
    </html>
