<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date function</title>
</head>
<body>

    <h1 align="center"> Date Function</h1>
    <script>
       var today = new Date();
       document.write(today+"<br><br>");

       var date= (today.getDate())+"/"+ (today.getMonth()+1)+"/"+(today.getFullYear());
       document.write(date+"<br><br>");

       var time=(today.getHours())+":"+(today.getMinutes())+":"+(today.getSeconds());
       document.write(time+"<br><br>")

    </script>


-----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

<script>
    const d= new Date();
    let d1=d.toLocaleDateString();
    document.write(d1+"<br>");

    let t1=d.toLocaleTimeString();
    document.write(t1+"<br>");

    let dt=d.toLocaleString();
    document.write(dt+"<br>")
   
</script>
</body>
</html>
