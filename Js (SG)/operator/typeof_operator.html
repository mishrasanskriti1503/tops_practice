<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>javascript</title>
</head>

<body>

    <h2>
        Type of Operator
    </h2>
    <script>

        document.write('<br>x is 10 ' + typeof (10))
        document.write('<br>x is "10" ' + typeof ("10"))
        document.write('<br>x is 10.25 ' + typeof (10.25))
        document.write('<br>x is R ' + typeof (R))
        document.write('<br>x is "abc" ' + typeof ("abc"))
        document.write('<br>x is true ' + typeof (true))
        document.write('<br>x is false ' + typeof (false))

        let x
        document.write('<br>number x is '+typeof(x))
        x=[]
        document.write('<br>number x is '+typeof(x))
        x={}
        document.write('<br>number x is '+typeof(x))

    </script>
</body>

</html>
