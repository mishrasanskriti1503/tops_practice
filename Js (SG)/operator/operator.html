<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>javascript</title>
</head>

<body>




    <h2> Arithmeric operator ( +  -  *  /  %  ** ++ -- )</h2>
    <script>

        //Arithmeric operator ( +  -  *  /  %  ** ++ -- )

        let a = 33
        let b = 5

        document.write('<br> a+b is : ' + (a + b))
        document.write('<br> a-b is : ' + (a - b))
        document.write('<br> a*b is : ' + (a * b))
        document.write('<br> a/b is : ' + (a / b))
        document.write('<br> a%b is : ' + (a % b))
        document.write('<br> b** is : ' + (b ** 2))
        </script>


        <h2> increment decrement Operator (++, --) </h2>

        <script>
        c = b++
        document.write('<br> c is : ' + b++)
        document.write('<br> c is : ' + (c))

        c = ++b
        document.write('<br> c is : ' + (c))
        document.write('<br> c is : ' + (c))

        document.write('<br>b is ' + b) //3
        c = b++ //postfix = old value //first value assign & then increment
        document.write('<br>b is ' + b) //4
        document.write('<br>c is ' + c) //3
        c = ++b //prefix = new value first increment & then value assign
        document.write('<br>b is ' + b) //5
        document.write('<br>c is ' + c) //5

        // comparision / Relational operator

        /*  == ( compare only value ), ===  ( compare both value & data type ), 
        ! ( not equal to), > (lesss than), < (more than), <= (more than equal to)  ,
         >= (less than equal to)*/

      
    </script>
</body>

</html>
