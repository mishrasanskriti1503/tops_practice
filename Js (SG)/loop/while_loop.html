<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>javascript</title>
</head>

<body>

    <h3> Natural No. till 10 </h3>
    <script>
        var i = 1
        while (i <= 10) {
            document.write('<br> I is :  ' + i)
            i++

        }
    </script>

    <hr>
    <h3>Reverse no.</h3>
    <script>
        var i = 10
        while (i > 1) {
            document.write('<br> I is :  ' + i)
            i--
        }
    </script>
    <hr>
    <h3>Even No.</h3>
    <script>
        var i = 1
        while (i <= 20) {
            if (
                i % 2 == 0) {
                document.write('<br> i is :' + i)

            }
            i++
        }
    </script>

    <h3>Odd No.</h3>
    <script>
        var i = 1
        while (i <= 20) {
            if (i % 2 != 0) {
                document.write('<br> i is :' + i)
            }
            i++
        }

    </script>

    <h3>sum of no</h3>
    <script>
        var n = 10
        var i = 1
        var sum = 0

        while (i <= n) {
            sum = sum + i
            i++
            document.write('<br> Sum is :' + sum)
        }


    </script>

<h3> Factorial of 5</h3>
<script>
    var n=5;
    var i=1;
    var Factorial=1

    while (i<=n){
        Factorial *=i
        i++
    }
    
document.write('<br> Factorial of ' + n + ' is: ' + Factorial);

    i++



</script>
</body>

</html>
