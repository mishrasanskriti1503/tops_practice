<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>javascript</title>
</head>

<body>


    <h3>Counting Reverse</h3>
    <script>
        let i = 10
        do {
            document.write('<br> i is :' + i);
            i--;
        }
        while (i >= 1);
    </script>

    <hr>
    <h3>Counting Up</h3>
    <script>
        let j = 1
        do {
            document.write('<br> j is : ' + j);
            j++;
        }
        while (j <= 15);
    </script>

    <hr>
    <h3>sum of numbers</h3>
    <script>
        let a = 1;
        let sum = 0;
        do {
            sum += a;
            a++


        }
        while (a <= 15);
        document.write('<br> sum is :' + sum);


        let x = 1;
        let add = 0;
        do {
            add += x;
            x++
        }

        while (x <= 100)
        document.write('<br> Addition is ' + add);

    </script>

    <hr>
    <h3> Odd Numbers</h3>

    <script>
        let p = 1
        do {
            if (p % 2 != 0) {
                document.write('<br> Odd No is :' + p)


            }
            p++
        }

        while (p <= 25)
    </script>

    <hr>
    <h3> Even Numbers</h3>
    <script>
        let m = 0;
        do {
            if (m % 2 == 0) {
                document.write('<br> Even No is : ' + m)
            }
            m++;
        }
        while (m <= 20)
    </script>

    <hr>
    <h3>Factorial No</h3>
    <script>
        var n = 8;
        var f = 1;
        let Factorial = 1;
        do {
            Factorial *= f;
            f++
        }

        while (f <= n);
        document.write('<br> Factorial of 8  is : ' + Factorial)
    </script>






</body>

</html>
