    <h3> Square </h3>
    <script>
        for (let i = 1; i <= 4; i++) {
            for (let j = 1; j <= 4; j++) {
                document.write(' * ')

            document.write('<br>')
        }

        document.write('<br><hr><br>')
        document.write('<h3> Right Triangle</h3>')
        for (let i = 1; i <= 7; i++) {
            for (let j = 1; j <= i; j++) {
                document.write(' * ')
            }
            document.write(' <br> ')
        }

        document.write('<br><hr><br>')
        document.write('<h3> inverted Triangle</h3>')
        for (let i = 5; i >= 1; i--) {
            for (let j = 1; j <= i; j++) {
                document.write(' * ')
            }
            document.write(' <br> ')
        }

        document.write('<br><hr><br>')
        document.write('<h3> Triangle with Numbers</h3>')
        for (let i = 1; i <= 5; i++){
            for(let j=1; j<=i; j++){
                document.write(j +' ')
            }
            document.write( '<br> ')
        }
