<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>loop</title>
</head>
<body>
    
    <script>
       for(let i=1;i<=5;i++){
                for (let j=1; j<=5; j++){
                     if((i+j)>=6){
                    document.write('* ')
                }
                else{
                    document.write('&nbsp;&nbsp;&nbsp;')
                }
                
               
            }
            document.write('<br>')
       }

       //-------------------------------------


       
       
           

    </script>
</body>
</html>
