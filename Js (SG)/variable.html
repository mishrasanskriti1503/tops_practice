<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        // Variable

        //1) Nothing 
        a = 20
        b = 10
        c = a + b

        document.write('sum is : ' + c)
        document.write('<br> sum is :' + (a + b))

        // 2) Var keyword  (redeclare & reassign is possible )

        var x = "hii"
        document.write('<br>' + x)
        var x = 12345
        document.write('<br>' + x)

        // 3) const ( cant redeclare & reassign)

        const pi = 3.14
        var r = 2.5

        document.write('<br> Area of circle is :' + (pi * r * r))

        //4) Let ( cant redeclare but it can reassign)

        let n = 25
        document.write('<br> n = ' + n)
        n = 56 
        document.write('<br> n =' + n)
        

    </script>
</body>

</html>
