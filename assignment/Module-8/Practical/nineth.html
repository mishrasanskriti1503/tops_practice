<!DOCTYPE html>
<html>
<head>
    <title>Button Click Event</title>
</head>
<body>

<h3>Event Listener Example</h3>

<button id="myBtn">Click Me</button>

<script>
// Select the button
let btn = document.getElementById("myBtn");

// Add event listener
btn.addEventListener("click", function() {
    alert("Button clicked!");
});
</script>

</body>
</html>
