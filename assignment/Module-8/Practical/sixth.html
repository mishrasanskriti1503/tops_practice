<!DOCTYPE html>
<html>
<head>
    <title>Functions Example</title>
</head>
<body>

<script>

// ----------- Task 1: greetUser Function -----------
function greetUser(name) {
    document.write("Hello, " + name + "!<br><br>");
}

// Function call
greetUser("Kriti");


// ----------- Task 2: calculateSum Function -----------
function calculateSum(a, b) {
    return a + b;
}

// Function call
let result = calculateSum(10, 20);
document.write("Sum = " + result);

</script>

</body>
</html>
