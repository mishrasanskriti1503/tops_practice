<!DOCTYPE html>
<html>
<head>
    <title>Array Example</title>
</head>
<body>

<script>

// ----------- Task 1: Fruits Array Operations -----------
document.write("<h3>Task 1: Fruits Array</h3>");

let fruits = ["apple", "banana", "cherry"];

// Add fruit to end
fruits.push("mango");

// Remove first fruit
fruits.shift();

// Display modified array
document.write("Modified Array: " + fruits + "<br><br>");


// ----------- Task 2: Sum of Array Elements -----------
document.write("<h3>Task 2: Sum of Array Elements</h3>");

let numbers = [10, 20, 30, 40, 50];
let sum = 0;

for (let i = 0; i < numbers.length; i++) {
    sum += numbers[i];
}

document.write("Sum = " + sum);

</script>

</body>
</html>
