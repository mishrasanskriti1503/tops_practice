<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Operators</title>
</head>
<body>

    <script>

        // Declare two numbers
        let a = 20;
        let b = 4;

        // Arithmetic Operators
        document.write("<h3>Arithmetic Operators</h3>");
        document.write("Addition: " + (a + b) + "<br>");
        document.write("Subtraction: " + (a - b) + "<br>");
        document.write("Multiplication: " + (a * b) + "<br>");
        document.write("Division: " + (a / b) + "<br><br>");

        // Comparison Operators
        document.write("<h3>Comparison Operators</h3>");
        document.write("Are numbers equal? " + (a == b) + "<br>");
        document.write("Is a greater than b? " + (a > b) + "<br><br>");

        // Logical Operators
        document.write("<h3>Logical Operators</h3>");
        document.write("Both conditions are true: " + (a > 10 && b < 5));

    </script>

</body>
</html>
