<!DOCTYPE html>
<html>
<head>
    <title>DOM Manipulation</title>
</head>
<body>

<p id="text">Hello, World!</p>

<script>
// Select the paragraph
let para = document.getElementById("text");

// Change text
para.innerHTML = "JavaScript is fun!";

// Change color
para.style.color = "blue";
</script>

</body>
</html>
