<!DOCTYPE html>
<html>
<head>
    <title>Functions in JavaScript</title>
</head>
<body>

    <h1>JavaScript Function Tasks</h1>

    <script>

        // Task 1: Greeting Function

        function greetUser(name) {
            document.write("<h3>Hello, " + name + "!</h3>");
        }

        greetUser("kriti");


        // Task 2: Sum Function

        function calculateSum(num1, num2) {
            return num1 + num2;
        }

        let result = calculateSum(10, 20);

        document.write("<h3>Sum = " + result + "</h3>");

    </script>

</body>
</html>
