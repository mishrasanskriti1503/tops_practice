<!DOCTYPE html>
<html>
<head>
    <title>Button Click Event</title>
</head>
<body>

    <h1>JavaScript Event Listener Example</h1>

    <button id="btn">Click Me</button>

    <script>

        // Select button

        let button = document.getElementById("btn");

        // Add event listener

        button.addEventListener("click", function() {

            alert("Button clicked!");

        });

    </script>

</body>
</html>
