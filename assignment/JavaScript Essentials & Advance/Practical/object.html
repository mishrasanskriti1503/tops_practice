<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Object</title>
</head>
<body>

    <h1>JavaScript Object Example</h1>

    <script>

        // Create Object

        let car = {
            brand: "Toyota",
            model: "Fortuner",
            year: 2020
        };

        // Access and display brand and model

        document.write("<h3>Car Brand: " + car.brand + "</h3>");
        document.write("<h3>Car Model: " + car.model + "</h3>");


        // Update year property

        car.year = 2024;

        document.write("<h3>Updated Year: " + car.year + "</h3>");


        // Add new property color

        car.color = "Black";

        document.write("<h3>Car Color: " + car.color + "</h3>");

    </script>

</body>
</html>
