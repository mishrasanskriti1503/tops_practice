<!DOCTYPE html>
<html>
<head>
    <title>DOM Manipulation Example</title>
</head>
<body>

    <h1>JavaScript DOM Manipulation</h1>

    <p id="demo">
        Hello, World!
    </p>

    <p id="info">
        This paragraph will also be updated using JavaScript.
    </p>

    <script>

        let paragraph = document.getElementById("demo");

        paragraph.innerHTML = "JavaScript is fun!";
        paragraph.style.color = "blue";
        paragraph.style.fontSize = "30px";
        paragraph.style.fontWeight = "bold";
        paragraph.style.backgroundColor = "lightgray";
        paragraph.style.padding = "10px";
        paragraph.style.width = "300px";



        let info = document.getElementById("info");

        info.innerHTML = "DOM manipulation allows us to change HTML and CSS using JavaScript.";
        info.style.color = "green";
        info.style.fontSize = "22px";
        info.style.fontFamily = "Arial";

    </script>

</body>
</html>
