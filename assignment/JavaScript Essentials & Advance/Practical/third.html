<!DOCTYPE html>
<html>
<head>
    <title>Operators Example</title>
</head>
<body>

<script>
// Declare two numbers
let a = 15;
let b = 4;

// Arithmetic Operations
document.write("<h3>Arithmetic Operations</h3>");
document.write("Addition: " + (a + b) + "<br>");
document.write("Subtraction: " + (a - b) + "<br>");
document.write("Multiplication: " + (a * b) + "<br>");
document.write("Division: " + (a / b) + "<br><br>");

// Comparison Operators
document.write("<h3>Comparison Operators</h3>");
document.write("Are a and b equal? " + (a == b) + "<br>");
document.write("Is a greater than b? " + (a > b) + "<br><br>");

// Logical Operators
document.write("<h3>Logical Operators</h3>");
document.write("Is (a > 10 AND b < 5)? " + (a > 10 && b < 5) + "<br>");
</script>

</body>
</html>
