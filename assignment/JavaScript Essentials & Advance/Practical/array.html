<!DOCTYPE html>
<html>
<head>
    <title>Array in JavaScript</title>
</head>
<body>

    <h1>JavaScript Array Tasks</h1>

    <script>

        // Task 1: Array Operations

        let fruits = ["apple", "banana", "cherry"];

        // Add fruit at the end
        fruits.push("mango");

        // Remove first fruit
        fruits.shift();

        // Display modified array
        console.log(fruits);



        // Task 2: Sum of Array Elements

        let numbers = [10, 20, 30, 40, 50];

        let sum = 0;

        for(let i = 0; i < numbers.length; i++) {
            sum = sum + numbers[i];
        }

        document.write("<h3>Sum of Array Elements = " + sum + "</h3>");

    </script>

</body>
</html>
