<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="demo">Hiiii...</div>
    <button onclick="abc()">Change</button>

    <div id="demo1">Test</div>
    <button id="btn1">button</button>

    <script>
        function abc(){
        $('#demo').html('helloworld')
        $('#demo').css('color','red')
        }
        $('#btn1').click(function(){
             $('#demo1').text('test')
             $('#demo1').css('color','blue')
 })
    </script>
</body>
