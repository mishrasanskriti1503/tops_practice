<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       let num =12345
       let count=0
       let sum =0
        //count of digits 
        //sum of digits

    while(num>0){
       let r=num%10
        num=Math.floor(num/10)
        sum=sum+r
        count++
    }
   document.write('<br>count:'+ count)
   document.write('<br>sum:'+ sum)

    </script>
</body>
</html>
