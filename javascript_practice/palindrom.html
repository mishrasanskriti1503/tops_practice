<body>
    
    <script>
        let no = 125
        let rev=0
        let n= no 
        while(no>0){
            let r=no%10 //5*10=50 +2 =52 52*10=520+
            no=Math.floor(no/10)
            rev=(rev*10)+r

        }

        document.write('<br> Reverse no is :' + rev)
        if(n==no){
        document.write('<br> it is  palindrome no  ' )
        }
        else{
        document.write('<br> it is not palindrome no  ')
        
        }
        
    </script>
</body>
