<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Cards</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border-radius: 12px;
      height: 100%; /* full height inside column */
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    }
    h6 img {
      width: 28px;
      height: 28px;
    }
    h6 {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card h5 {
      min-height: 60px; /* title ka height fix taki cards equal lage */
    }
  </style>
</head>
<body class="bg-light">

<div class="container my-5">
  <div class="row g-4">

    <!-- Card 1 -->
    <div class="col-sm-6 col-md-4 d-flex">
      <div class="card shadow-sm p-3 w-100 d-flex flex-column">
        <div class="d-flex justify-content-between">
          <h6 class="mb-0">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS9a0weXYGX2N7Zh6hmGgz2V7lXKxRi-HLpo6N9Zkc377lV4jUKYkjalZM&s"/> 
            Mailchimp
          </h6>
          <span class="badge bg-warning">Design</span>
        </div>
        <small class="text-muted">4 days ago</small>
        <h5 class="mt-2">Senior Product Designer - Singapore</h5>
        <div class="progress my-3" style="height: 6px;">
          <div class="progress-bar bg-danger" role="progressbar" style="width: 64%;" 
               aria-valuenow="32" aria-valuemin="0" aria-valuemax="50"></div>
        </div>
        <small class="text-muted mt-auto">32 Applied of 50 capacity</small>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="col-sm-6 col-md-4 d-flex">
      <div class="card shadow-sm p-3 w-100 d-flex flex-column">
        <div class="d-flex justify-content-between">
          <h6 class="mb-0">
            <img src="https://img.icons8.com/ios-filled/24/dribbble.png"/> 
            Dribbble
          </h6>
          <span class="badge bg-warning">Product</span>
        </div>
        <small class="text-muted">4 days ago</small>
        <h5 class="mt-2">Junior Product Designer - Singapore</h5>
        <div class="progress my-3" style="height: 6px;">
          <div class="progress-bar bg-danger" role="progressbar" style="width: 60%;" 
               aria-valuenow="42" aria-valuemin="0" aria-valuemax="70"></div>
        </div>
        <small class="text-muted mt-auto">42 Applied of 70 capacity</small>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="col-sm-6 col-md-4 d-flex">
      <div class="card shadow-sm p-3 w-100 d-flex flex-column">
        <div class="d-flex justify-content-between">
          <h6 class="mb-0">
            <img src="https://img.icons8.com/ios-glyphs/24/reddit.png"/> 
            Reddit
          </h6>
          <span class="badge bg-warning">Development</span>
        </div>
        <small class="text-muted">2 days ago</small>
        <h5 class="mt-2">Software Architect - Java (USA)</h5>
        <div class="progress my-3" style="height: 6px;">
          <div class="progress-bar bg-danger" role="progressbar" style="width: 52%;" 
               aria-valuenow="52" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
        <small class="text-muted mt-auto">52 Applied of 100 capacity</small>
      </div>
    </div>

  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
