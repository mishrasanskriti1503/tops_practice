<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bio-Stack Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS Variables ─────────────────────────────── */
    :root {
      --bg:          #0a0a0f;
      --surface:     #13131a;
      --surface2:    #1c1c27;
      --border:      #2a2a3d;
      --accent:      #7c6af5;
      --accent2:     #f564a9;
      --text:        #f0f0fa;
      --text-muted:  #8888aa;
      --link-bg:     #1c1c27;
      --link-hover:  #252537;
      --error:       #ff5e7a;
      --success:     #4adeaa;
      --shadow:      0 8px 32px rgba(0,0,0,0.45);
      --radius:      14px;
      --transition:  0.22s cubic-bezier(0.4,0,0.2,1);
    }

    [data-theme="light"] {
      --bg:          #f4f2ff;
      --surface:     #ffffff;
      --surface2:    #eeecfa;
      --border:      #d8d4f0;
      --text:        #18182a;
      --text-muted:  #6b6b8a;
      --link-bg:     #f0eeff;
      --link-hover:  #e6e2ff;
      --shadow:      0 8px 32px rgba(100,90,200,0.13);
    }

    /* ── Reset & Base ──────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 60px;
      transition: background var(--transition), color var(--transition);
    }

    /* Mesh background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,106,245,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(245,100,169,0.13) 0%, transparent 70%);
      z-index: 0;
    }

    /* ── Layout ────────────────────────────────────── */
    .app-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Header ────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 8px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .theme-toggle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 1.2rem;
      transition: background var(--transition), border-color var(--transition), transform 0.2s;
      color: var(--text);
    }

    .theme-toggle:hover { transform: rotate(20deg); border-color: var(--accent); }

    /* ── Profile Card ──────────────────────────────── */
    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px 24px;
      box-shadow: var(--shadow);
      animation: fadeUp 0.5s ease both;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid;
      place-items: center;
      font-size: 1.8rem;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px var(--surface), 0 0 0 5px var(--accent);
    }

    .profile-meta { flex: 1; }

    .profile-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .verified-badge {
      display: none;
      align-items: center;
      gap: 3px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 20px;
      font-family: 'DM Sans', sans-serif;
    }

    .verified-badge.show { display: inline-flex; animation: pop 0.3s cubic-bezier(0.34,1.56,0.64,1); }

    .profile-bio {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 3px;
      font-style: italic;
    }

    .follower-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .follower-label { font-size: 0.78rem; color: var(--text-muted); }

    .follower-input-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .follower-input {
      width: 100px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      text-align: right;
      outline: none;
      transition: border-color var(--transition);
    }

    .follower-input:focus { border-color: var(--accent); }

    /* ── Add Link Form ─────────────────────────────── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow);
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .form-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .input-group { display: flex; flex-direction: column; gap: 10px; }

    .input-row { display: flex; gap: 10px; }

    .field {
      position: relative;
      flex: 1;
    }

    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .field input::placeholder { color: var(--text-muted); }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,245,0.15); }
    .field input.error { border-color: var(--error); box-shadow: 0 0 0 3px rgba(255,94,122,0.12); }

    .error-msg {
      display: none;
      font-size: 0.75rem;
      color: var(--error);
      margin-top: 5px;
      padding-left: 4px;
    }

    .error-msg.show { display: block; animation: shake 0.3s ease; }

    .btn-add {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      border: none;
      border-radius: var(--radius);
      padding: 12px 20px;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity var(--transition), transform var(--transition);
      letter-spacing: 0.02em;
    }

    .btn-add:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }

    /* ── Preview Section ───────────────────────────── */
    .preview-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow);
      animation: fadeUp 0.5s 0.2s ease both;
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .preview-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .link-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--surface2);
      border-radius: 20px;
      padding: 3px 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
    }

    .links-list { display: flex; flex-direction: column; gap: 10px; }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-muted);
      font-size: 0.88rem;
      font-style: italic;
    }

    .empty-icon { font-size: 2rem; margin-bottom: 8px; opacity: 0.5; }

    /* ── Link Item ─────────────────────────────────── */
    .link-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--link-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      transition: background var(--transition), transform var(--transition);
      animation: fadeUp 0.3s ease both;
    }

    .link-item:hover { background: var(--link-hover); transform: translateX(3px); }

    .link-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid;
      place-items: center;
      font-size: 0.85rem;
      flex-shrink: 0;
      color: white;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
    }

    .link-info { flex: 1; overflow: hidden; }

    .link-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-url {
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .link-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .btn-open, .btn-remove {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 0.85rem;
      transition: background var(--transition), border-color var(--transition), transform 0.15s;
      color: var(--text);
      text-decoration: none;
    }

    .btn-open:hover { border-color: var(--accent); background: rgba(124,106,245,0.12); transform: scale(1.1); }
    .btn-remove:hover { border-color: var(--error); background: rgba(255,94,122,0.12); transform: scale(1.1); }

    /* ── Footer ────────────────────────────────────── */
    .footer {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 8px;
      opacity: 0.7;
    }

    /* ── Animations ────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pop {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-5px); }
      75%       { transform: translateX(5px); }
    }

    @keyframes slideOut {
      to { opacity: 0; transform: translateX(30px); max-height: 0; padding: 0; margin: 0; }
    }

    .link-item.removing {
      animation: slideOut 0.25s ease forwards;
    }

    /* ── Responsive ────────────────────────────────── */
    @media (max-width: 420px) {
      .input-row { flex-direction: column; }
      .profile-name { font-size: 1rem; }
    }
  </style>
</head>
<body>

<div class="app-wrapper">

  <!-- Header -->
  <header class="header">
    <div class="logo">Bio·Stack</div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
  </header>

  <!-- Profile Card -->
  <div class="profile-card">
    <div class="profile-header">
      <div class="avatar">✦</div>
      <div class="profile-meta">
        <div class="profile-name">
          Creator Profile
          <span class="verified-badge" id="verifiedBadge">✓ Verified</span>
        </div>
        <div class="profile-bio">Your personal link-in-bio page</div>
      </div>
    </div>
    <div class="follower-bar">
      <span class="follower-label">Followers (try 10000+ for badge ✦)</span>
      <div class="follower-input-wrap">
        <input
          type="number"
          id="followerInput"
          class="follower-input"
          value="0"
          min="0"
          placeholder="0"
        />
      </div>
    </div>
  </div>

  <!-- Add Link Form -->
  <div class="form-card">
    <div class="form-title">+ Add a Link</div>
    <div class="input-group">
      <div class="field">
        <input type="text" id="titleInput" placeholder="Link title (e.g. YouTube)" />
      </div>
      <div class="input-row">
        <div class="field" style="flex:1">
          <input type="text" id="urlInput" placeholder="https://..." />
          <div class="error-msg" id="urlError">⚠ URL must start with https://</div>
        </div>
        <button class="btn-add" id="addBtn">Add</button>
      </div>
    </div>
  </div>

  <!-- Profile Preview -->
  <div class="preview-card">
    <div class="preview-header">
      <div class="preview-title">Profile Preview</div>
      <div class="link-count" id="linkCount">0 links</div>
    </div>
    <div class="links-list" id="linksList">
      <div class="empty-state">
        <div class="empty-icon">🔗</div>
        No links yet — add your first one above!
      </div>
    </div>
  </div>

  <div class="footer">Bio-Stack Builder · Links saved in your browser</div>

</div>

<script>
  /* ── State ───────────────────────────────────────── */
  const STORAGE_KEY   = 'biostack_links';
  const THEME_KEY     = 'biostack_theme';
  const FOLLOWER_KEY  = 'biostack_followers';
  const THRESHOLD     = 10000;

  let links = loadLinks();

  /* ── DOM Refs ────────────────────────────────────── */
  const titleInput    = document.getElementById('titleInput');
  const urlInput      = document.getElementById('urlInput');
  const urlError      = document.getElementById('urlError');
  const addBtn        = document.getElementById('addBtn');
  const linksList     = document.getElementById('linksList');
  const linkCount     = document.getElementById('linkCount');
  const themeToggle   = document.getElementById('themeToggle');
  const verifiedBadge = document.getElementById('verifiedBadge');
  const followerInput = document.getElementById('followerInput');

  /* ── LocalStorage Helpers ────────────────────────── */
  function loadLinks() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch { return []; }
  }

  function saveLinks() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
  }

  /* ── URL Validation ──────────────────────────────── */
  function isValidURL(url) {
    try {
      const parsed = new URL(url);
      return parsed.protocol === 'https:';
    } catch {
      return false;
    }
  }

  /* ── Verified Badge ──────────────────────────────── */
  function updateBadge(followers) {
    const count = parseInt(followers, 10) || 0;
    if (count >= THRESHOLD) {
      verifiedBadge.classList.add('show');
    } else {
      verifiedBadge.classList.remove('show');
    }
  }

  /* ── Render Links ────────────────────────────────── */
  function renderLinks() {
    linkCount.textContent = `${links.length} link${links.length !== 1 ? 's' : ''}`;

    if (links.length === 0) {
      linksList.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔗</div>
          No links yet — add your first one above!
        </div>`;
      return;
    }

    // Use array + template literals to build all items
    linksList.innerHTML = links.map((link, index) => {
      const initial = link.title.charAt(0).toUpperCase();
      return `
        <div class="link-item" data-index="${index}">
          <div class="link-icon">${initial}</div>
          <div class="link-info">
            <div class="link-title">${escapeHTML(link.title)}</div>
            <div class="link-url">${escapeHTML(link.url)}</div>
          </div>
          <div class="link-actions">
            <a href="${escapeHTML(link.url)}" target="_blank" rel="noopener" class="btn-open" title="Open link">↗</a>
            <button class="btn-remove" data-index="${index}" title="Remove link">✕</button>
          </div>
        </div>`;
    }).join('');
  }

  function escapeHTML(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ── Add Link ────────────────────────────────────── */
  function addLink() {
    const title = titleInput.value.trim();
    const url   = urlInput.value.trim();

    // Reset errors
    urlInput.classList.remove('error');
    urlError.classList.remove('show');

    if (!title) {
      titleInput.focus();
      titleInput.style.borderColor = 'var(--error)';
      setTimeout(() => titleInput.style.borderColor = '', 1200);
      return;
    }

    if (!isValidURL(url)) {
      urlInput.classList.add('error');
      urlError.classList.add('show');
      urlInput.focus();
      return;
    }

    // Store as object in array
    links.push({ title, url });
    saveLinks();
    renderLinks();

    // Clear inputs
    titleInput.value = '';
    urlInput.value   = '';
    urlInput.classList.remove('error');
    urlError.classList.remove('show');
    titleInput.focus();
  }

  /* ── Delete Link (Event Delegation) ─────────────── */
  linksList.addEventListener('click', (e) => {
    const removeBtn = e.target.closest('.btn-remove');
    if (!removeBtn) return;

    const index = parseInt(removeBtn.dataset.index, 10);
    const item  = removeBtn.closest('.link-item');

    // Animate out, then remove
    if (item) {
      item.classList.add('removing');
      item.addEventListener('animationend', () => {
        links.splice(index, 1);
        saveLinks();
        renderLinks();
      }, { once: true });
    }
  });

  /* ── Form Submit ─────────────────────────────────── */
  addBtn.addEventListener('click', addLink);

  [titleInput, urlInput].forEach(input => {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addLink();
    });
  });

  urlInput.addEventListener('input', () => {
    if (urlInput.classList.contains('error') && isValidURL(urlInput.value.trim())) {
      urlInput.classList.remove('error');
      urlError.classList.remove('show');
    }
  });

  /* ── Follower Count → Badge ──────────────────────── */
  followerInput.addEventListener('input', () => {
    const val = followerInput.value;
    localStorage.setItem(FOLLOWER_KEY, val);
    updateBadge(val);
  });

  /* ── Theme Toggle ────────────────────────────────── */
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeToggle.textContent = theme === 'dark' ? '🌙' : '☀️';
    localStorage.setItem(THEME_KEY, theme);
  }

  themeToggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'dark' ? 'light' : 'dark');
  });

  /* ── Init ────────────────────────────────────────── */
  (function init() {
    // Restore theme
    const savedTheme = localStorage.getItem(THEME_KEY) || 'dark';
    applyTheme(savedTheme);

    // Restore followers
    const savedFollowers = localStorage.getItem(FOLLOWER_KEY) || '0';
    followerInput.value = savedFollowers;
    updateBadge(savedFollowers);

    // Render saved links
    renderLinks();
  })();
</script>
</body>
</html>
