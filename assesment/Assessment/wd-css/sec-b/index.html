<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Section-B Creator Persona</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- Header -->
    <header class="hero">
        <img src="img.JPG" alt="Creator Profile" class="profile-img">

        <h1>Sanskriti Mishra</h1>

        <p class="tagline">
            Frontend Developer 
        </p>
    </header>

    <!-- Navigation -->
    <nav class="navbar">
        <ul>
            <li><a href="#about">About</a></li>
            <li><a href="#skills">Skills</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main>

        <!-- About Section -->
        <section id="about" class="card">
            <h2>About Me</h2>

            <p>
                I am a passionate frontend developer who loves creating
                responsive and modern websites.
            </p>
        </section>

        <!-- Skills Section -->
        <section id="skills" class="card">
            <h2>Skills</h2>

            <div class="skills-container">
                <div class="skill-box">HTML</div>
                <div class="skill-box">CSS</div>
                <div class="skill-box">JavaScript</div>
                <div class="skill-box">React.js</div>
            </div>
        </section>

        <!-- Contact Section -->
        <section id="contact" class="card">
            <h2>Connect With Me</h2>

            <div class="social-links">

                <a href="https://instagram.com" target="_blank">
                    <i class="fa-brands fa-instagram"></i>
                    Instagram
                </a>

                <a href="https://youtube.com" target="_blank">
                    <i class="fa-brands fa-youtube"></i>
                    YouTube
                </a>

                <a href="https://github.com" target="_blank">
                    <i class="fa-brands fa-github"></i>
                    GitHub
                </a>

            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 Creator Persona. All Rights Reserved.</p>
    </footer>

</body>

</html>
