<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>loop</title>

    <style>
        .box{
            width:80px;
            height:80px;
            padding:10px;
            background-color: red;
            color: white;
            margin: 1%;
            float:left;
           text-align: center;
           
        }
    </style>
</head>

<body>
    <script>
        var i=1;
            while (i<=100) 
            {
                document.write( "<h2> Kriti Mishra </h2>" );
                i++;
            }

        var i=1;
            do
            {
                document.write( "<h2 style='color:red';> Kriti Mishra </h2>")
                i++;
            }

             while (i<=20);

             var i=1;
             while (i<=50)
            {
                document.write("<div class='box'> Hello </div>")
                i++;
            }
    </script>
</body>

</html>
